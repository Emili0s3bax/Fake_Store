<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Aroma | Luxury Fragrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #d4af37;
            --bg: #fdfdfd;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Mitad y mitad */
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        /* Izquierda: Imagen */
        .product-image {
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            width: 100%;
            height: 600px;
            object-fit: cover;
        }

        /* Derecha: Información */
        .product-info {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back-link {
            text-decoration: none;
            color: #bbb;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--primary); }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            line-height: 1.1;
        }

        .description {
            color: #666;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .price {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent);
            margin: 0;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .product-image img { height: 400px; }
            .product-info { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container" id="product-detail">
        <p style="padding: 20px;">Inspirando el aroma...</p>
    </div>

    <script>
        // 1. Obtener el ID del perfume desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // 2. Fetch a la API por el ID específico
        if (productId) {
            fetch(`http://127.0.0.1:8000/api/products/${productId}`)
                .then(res => res.json())
                .then(p => {
                    const container = document.getElementById("product-detail");
                    
                    // Limpieza de ruta de imagen (debe estar en tu carpeta 'images/')
                    let imgPath = p.images.startsWith('/') ? p.images.substring(1) : p.images;

                    container.innerHTML = `
                        <div class="product-image">
                            <img src="${imgPath}" alt="${p.title}">
                        </div>
                        <div class="product-info">
                            <a href="index.html" class="back-link">← Volver a la colección</a>
                            <h1>${p.title}</h1>
                            <p class="description">${p.description}</p>
                            <p class="price">$${p.price.toFixed(2)}</p>
                        </div>
                    `;
                    
                    document.title = `${p.title} | Luxury Fragrance`;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("product-detail").innerHTML = "<h1>Aroma no encontrado</h1>";
                });
        }
    </script>
</body>
</html>
